name: Formatter and Styler

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: Get last commit message
        run: |
          echo "LAST_COMMIT_MSG=$(git log -1 --format=%s)" >> $GITHUB_ENV

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Lint and Fix
        # Using your project's built-in fix script
        run: bun run lint:fix || true

      - name: Commit and Push fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "formatted: ${{ env.LAST_COMMIT_MSG }}"
          commit_options: '--no-verify'
